server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Include mime types for correct Content-Type headers
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Gzip compression - Disabled in container to avoid double-compression
    # Most production environments use a host-level reverse proxy (Nginx/Cloudflare)
    # which will handle compression.
    gzip off;
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    location / {
        # First attempt to serve request as file, then as directory, then index.html
        # Added $uri.html for better compatibility with Next.js static exports
        try_files $uri $uri.html $uri/ /index.html;
    }

    # Hashed static assets (Next.js) - Cache forever
    location /_next/static/ {
        expires max;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # QR codes - No cache for frequent updates
    location ~* (qun|my)\.png$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    }

    # Other static assets - Cache for 1 day
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1d;
        add_header Cache-Control "public, no-cache, must-revalidate";
    }

    # Custom Error Pages
    error_page 404 /index.html;
}


